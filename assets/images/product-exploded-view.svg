<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" fill="none" role="img" aria-label="Exploded product view">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8a8a"/>
      <stop offset="45%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#6e6e6e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(180,210,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(220,235,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(160,190,240,0.12)"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <ellipse cx="450" cy="640" rx="240" ry="36" fill="url(#floorGlow)"/>

  <!-- Cable -->
  <g filter="url(#softShadow)" transform="translate(120 420) rotate(-18)">
    <path d="M0 40 C80 10, 160 0, 240 20" stroke="#2a2a2a" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M0 40 C80 10, 160 0, 240 20" stroke="#444" stroke-width="8" stroke-linecap="round" fill="none"/>
    <rect x="-18" y="24" width="36" height="32" rx="6" fill="#333"/>
  </g>

  <!-- Motor housing -->
  <g filter="url(#softShadow)" transform="translate(560 360) rotate(12)">
    <circle cx="0" cy="0" r="58" fill="#252525"/>
    <circle cx="0" cy="0" r="42" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="28" fill="url(#metal)"/>
    <circle cx="0" cy="0" r="10" fill="#555"/>
    <path d="M-8 -34 L8 -34 L12 -18 L-12 -18 Z" fill="#666"/>
  </g>

  <!-- Glass jar -->
  <g filter="url(#softShadow)" transform="translate(620 180) rotate(8)">
    <path d="M-52 -70 L52 -70 L44 90 C44 118, -44 118, -44 90 Z" fill="url(#glass)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <ellipse cx="0" cy="-70" rx="52" ry="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <path d="M-30 10 Q0 28 30 10" stroke="rgba(255,255,255,0.18)" stroke-width="3" fill="none"/>
  </g>

  <!-- Lid / blade assembly -->
  <g filter="url(#softShadow)" transform="translate(700 80) rotate(15)">
    <ellipse cx="0" cy="0" rx="46" ry="16" fill="#2e2e2e"/>
    <rect x="-8" y="0" width="16" height="36" rx="4" fill="url(#metal)"/>
    <path d="M-22 42 L22 42 L14 58 L-14 58 Z" fill="#888"/>
    <path d="M0 58 L0 78" stroke="#aaa" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Main body -->
  <g filter="url(#softShadow)" transform="translate(340 300)">
    <path d="M-90 -120 L90 -120 C110 -120, 120 -100, 120 -70 L115 130 C115 165, 95 180, 70 180 L-70 180 C-95 180, -115 165, -115 130 L-120 -70 C-120 -100, -110 -120, -90 -120 Z" fill="url(#body)"/>
    <rect x="-70" y="-20" width="140" height="56" rx="8" fill="#111" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <circle cx="-42" cy="8" r="6" fill="#3ecf8e" opacity="0.9"/>
    <circle cx="0" cy="8" r="6" fill="rgba(255,255,255,0.15)"/>
    <circle cx="42" cy="8" r="6" fill="rgba(255,255,255,0.15)"/>
    <path d="M-55 90 H55" stroke="rgba(255,255,255,0.12)" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="118" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="3">RICO</text>
  </g>

  <!-- Base plate -->
  <g filter="url(#softShadow)" transform="translate(220 500) rotate(-10)">
    <ellipse cx="0" cy="0" rx="100" ry="28" fill="#2a2a2a"/>
    <ellipse cx="0" cy="-6" rx="88" ry="22" fill="#1f1f1f"/>
    <ellipse cx="0" cy="-10" rx="70" ry="16" fill="#333"/>
  </g>
</svg>
